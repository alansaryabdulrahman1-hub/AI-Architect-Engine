openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: openai
    description: OpenAI AI chat and architecture planning operations
  - name: architecture
    description: Architecture planning sessions and results
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /architecture/sessions:
    get:
      operationId: listArchitectureSessions
      tags: [architecture]
      summary: List all architecture planning sessions
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArchitectureSession"
    post:
      operationId: createArchitectureSession
      tags: [architecture]
      summary: Create a new architecture planning session and get AI-generated plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArchitectureSessionBody"
      responses:
        "200":
          description: SSE stream of AI-generated architecture plan
          content:
            text/event-stream: {}
  /architecture/sessions/{id}:
    get:
      operationId: getArchitectureSession
      tags: [architecture]
      summary: Get a specific architecture session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Architecture session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArchitectureSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteArchitectureSession
      tags: [architecture]
      summary: Delete an architecture session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /architecture/sessions/{id}/ifc:
    get:
      operationId: downloadArchitectureIfc
      tags: [architecture]
      summary: Download IFC/BIM file for an architecture session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: IFC file download
          content:
            application/x-step:
              schema:
                type: string
                format: binary
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /architecture/sessions/{id}/followup:
    post:
      operationId: sendArchitectureFollowup
      tags: [architecture]
      summary: Send a follow-up question about an architecture session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArchitectureFollowupBody"
      responses:
        "200":
          description: SSE stream of AI response
          content:
            text/event-stream: {}
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    ArchitectureSession:
      type: object
      properties:
        id:
          type: integer
        buildingType:
          type: string
        buildingSubtype:
          type: string
        area:
          type: number
        floors:
          type: string
        sideNorth:
          type: number
        sideSouth:
          type: number
        sideEast:
          type: number
        sideWest:
          type: number
        chordLength:
          type: number
        setbackFront:
          type: number
        setbackSide:
          type: number
        setbackBack:
          type: number
        acType:
          type: string
        facadeDirection:
          type: string
        stairLocation:
          type: string
        bedroomCount:
          type: integer
        kitchenType:
          type: string
        groundLevelDifference:
          type: number
        additionalRequirements:
          type: string
        isIrregularLand:
          type: boolean
        deedNumber:
          type: string
        plotNumber:
          type: string
        neighborEast:
          type: string
          description: Neighbor status on the east boundary (e.g. built, empty, street)
        neighborEastWindows:
          type: string
          description: Window/opening locations on east neighbor boundary when built
        neighborWest:
          type: string
          description: Neighbor status on the west boundary
        neighborWestWindows:
          type: string
          description: Window/opening locations on west neighbor boundary when built
        neighborSouth:
          type: string
          description: Neighbor status on the south boundary
        neighborSouthWindows:
          type: string
          description: Window/opening locations on south neighbor boundary when built
        soilType:
          type: string
          description: Soil type (rocky, sandy, clay, mixed)
        budgetRange:
          type: string
          description: Budget range (low, medium, high, premium)
        generatedPlan:
          type: string
        ifcReady:
          type: boolean
          description: Whether the IFC/BIM file has been generated and is ready for download
        floorPlanImageUrl:
          type: string
          nullable: true
        exteriorImageUrl:
          type: string
          nullable: true
        conversationId:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - buildingType
        - buildingSubtype
        - area
        - floors
        - generatedPlan
        - conversationId
        - createdAt
    CreateArchitectureSessionBody:
      type: object
      properties:
        buildingType:
          type: string
          enum: [villa, townhouse, apartment, offices, shop, other]
        buildingSubtype:
          type: string
        area:
          type: number
        floors:
          type: string
          enum: [ground_only, ground_first, ground_first_annex]
          description: Number of floors
        sideNorth:
          type: number
          description: North side length of the plot in meters
        sideSouth:
          type: number
          description: South side length of the plot in meters
        sideEast:
          type: number
          description: East side length of the plot in meters
        sideWest:
          type: number
          description: West side length of the plot in meters
        isIrregularLand:
          type: boolean
          description: Whether the land has irregular shape
        chordLength:
          type: number
          description: Chord/diagonal length for correcting irregular non-right-angle corners in meters
        setbackFront:
          type: number
          description: Front setback in meters (street side)
        setbackSide:
          type: number
          description: Side setback in meters (neighbor side)
        setbackBack:
          type: number
          description: Back setback in meters
        deedNumber:
          type: string
          description: Deed number for the plot
        plotNumber:
          type: string
          description: Plot number
        neighborEast:
          type: string
          description: Neighbor status on the east boundary (e.g. built, empty, street)
        neighborEastWindows:
          type: string
          description: Window/opening locations on east neighbor boundary when built
        neighborWest:
          type: string
          description: Neighbor status on the west boundary
        neighborWestWindows:
          type: string
          description: Window/opening locations on west neighbor boundary when built
        neighborSouth:
          type: string
          description: Neighbor status on the south boundary
        neighborSouthWindows:
          type: string
          description: Window/opening locations on south neighbor boundary when built
        soilType:
          type: string
          enum: [rocky, sandy, clay, mixed]
          description: Soil type
        budgetRange:
          type: string
          enum: [low, medium, high, premium]
          description: Budget range
        acType:
          type: string
          enum: [split, concealed, central]
          description: Air conditioning system type
        facadeDirection:
          type: string
          enum: [north, south, east, west]
          description: Main facade direction
        stairLocation:
          type: string
          enum: [central, side, back]
          description: Stair and elevator location within the building
        bedroomCount:
          type: integer
          minimum: 1
          description: Number of bedrooms required
        kitchenType:
          type: string
          enum: [open, closed]
          description: Kitchen type
        groundLevelDifference:
          type: number
          description: Ground level difference from street in centimeters
        additionalRequirements:
          type: string
        images:
          type: array
          items:
            type: string
          description: Array of base64-encoded image data URLs for sketches, site photos, or design references
      required:
        - buildingType
        - buildingSubtype
        - area
        - floors
        - sideNorth
        - sideSouth
        - sideEast
        - sideWest
        - setbackFront
        - setbackSide
        - setbackBack
    ArchitectureFollowupBody:
      type: object
      properties:
        question:
          type: string
        images:
          type: array
          items:
            type: string
          description: Array of base64-encoded image data URLs attached to the follow-up question
      required:
        - question

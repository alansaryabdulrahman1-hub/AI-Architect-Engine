  "react-markdown": "To render the AI-generated markdown architecture plans"
  "remark-gfm": "To support markdown tables and lists"
  "date-fns": "For formatting session dates"
  "clsx": "Utility for Tailwind class merging"
  "tailwind-merge": "Utility for Tailwind class merging"

images:
